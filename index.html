<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Board</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        margin: 0;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin-bottom: 2rem;
        color: #38bdf8;
      }
      .game-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        width: 100%;
        max-width: 1000px;
      }
      .game-card {
        background: #1e293b;
        padding: 1.5rem;
        border-radius: 1rem;
        border: 1px solid #334155;
        transition: transform 0.2s, border-color 0.2s;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .game-card:hover {
        transform: translateY(-4px);
        border-color: #38bdf8;
      }
      .game-icon {
        font-size: 3rem;
      }
      .game-card h3 {
        margin: 0;
        font-size: 1.25rem;
      }
      .game-card p {
        margin: 0;
        font-size: 0.875rem;
        color: #94a3b8;
        line-height: 1.5;
      }
      .play-btn {
        display: inline-block;
        background: #38bdf8;
        color: #0f172a;
        text-align: center;
        padding: 0.75rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        margin-top: auto;
        transition: background 0.2s;
      }
      .play-btn:hover {
        background: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <h1>Mini Game Board</h1>
    <div id="game-board"></div>
    <script src="script.js"></script>
  </body>
</html>
